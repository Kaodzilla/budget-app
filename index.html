<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記帳 App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding: 1rem; }
  .app { max-width: 480px; margin: 0 auto; padding: 1rem 0; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.25rem; }
  .balance-card { background: #1a1a1a; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; text-align: center; }
  .balance-label { font-size: 13px; color: #aaa; margin-bottom: 6px; }
  .balance-amount { font-size: 36px; font-weight: 500; color: #fff; }
  .balance-period { font-size: 12px; color: #777; margin-top: 6px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .stat { background: #fff; border-radius: 12px; padding: 14px; text-align: center; border: 0.5px solid #e0e0e0; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-amount { font-size: 18px; font-weight: 500; }
  .income-color { color: #1D9E75; }
  .expense-color { color: #E24B4A; }
  .chart-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
  .chart-title { font-size: 14px; font-weight: 500; color: #666; margin-bottom: 12px; }
  .chart-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .chart-tab { padding: 5px 14px; font-size: 13px; border-radius: 20px; border: 0.5px solid #ddd; background: #f5f5f0; color: #888; cursor: pointer; font-family: inherit; }
  .chart-tab.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .chart-wrap { display: flex; align-items: center; gap: 1rem; }
  .legend { flex: 1; min-width: 0; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-name { font-size: 13px; color: #555; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .legend-pct { font-size: 13px; font-weight: 500; color: #1a1a1a; }
  .chart-empty { text-align: center; color: #bbb; font-size: 14px; padding: 2rem 0; }
  .form-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
  .form-title { font-size: 14px; font-weight: 500; color: #666; margin-bottom: 12px; }
  .type-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
  .type-btn { flex: 1; padding: 9px; font-size: 14px; border-radius: 10px; border: 0.5px solid #ddd; background: #f5f5f0; color: #888; cursor: pointer; font-family: inherit; }
  .type-btn.active-income { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; }
  .type-btn.active-expense { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .form-label { font-size: 12px; color: #999; margin-bottom: 4px; }
  input, select { flex: 1; min-width: 0; padding: 9px 12px; border: 0.5px solid #ddd; border-radius: 10px; font-size: 14px; font-family: inherit; background: #f9f9f7; color: #1a1a1a; outline: none; }
  input:focus, select:focus { border-color: #999; background: #fff; }
  .add-btn { width: 100%; padding: 11px; font-size: 15px; font-weight: 500; border-radius: 10px; border: none; cursor: pointer; background: #1a1a1a; color: #fff; margin-top: 4px; font-family: inherit; }
  .add-btn:hover { opacity: 0.85; }
  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .month-nav-label { font-size: 15px; font-weight: 500; }
  .nav-btn { background: none; border: 0.5px solid #ddd; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 16px; color: #555; font-family: inherit; }
  .nav-btn:hover { background: #f0f0ec; }
  .section-title { font-size: 14px; font-weight: 500; color: #888; margin-bottom: 8px; }
  .record { display: flex; align-items: center; gap: 12px; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
  .record-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .record-info { flex: 1; min-width: 0; }
  .record-name { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .record-meta { font-size: 12px; color: #999; }
  .record-amount { font-size: 15px; font-weight: 500; flex-shrink: 0; }
  .del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; padding: 0 2px; flex-shrink: 0; line-height: 1; }
  .del-btn:hover { color: #E24B4A; }
  .empty { text-align: center; color: #bbb; font-size: 14px; padding: 2rem 0; }
</style>
</head>
<body>
<div class="app">
  <h1>記帳</h1>

  <div class="balance-card">
    <div class="balance-label">結餘</div>
    <div class="balance-amount" id="balance">NT$0</div>
    <div class="balance-period" id="period-label"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">本期收入</div>
      <div class="stat-amount income-color" id="total-income">NT$0</div>
    </div>
    <div class="stat">
      <div class="stat-label">本期支出</div>
      <div class="stat-amount expense-color" id="total-expense">NT$0</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-title">分類分析</div>
    <div class="chart-tabs">
      <button class="chart-tab active" onclick="setChartType('expense')">支出</button>
      <button class="chart-tab" onclick="setChartType('income')">收入</button>
    </div>
    <div id="chart-area"><div class="chart-empty">本期尚無資料</div></div>
  </div>

  <div class="form-card">
    <div class="form-title">新增紀錄</div>
    <div class="type-toggle">
      <button class="type-btn active-income" id="btn-income" onclick="setType('income')">收入</button>
      <button class="type-btn" id="btn-expense" onclick="setType('expense')">支出</button>
    </div>
    <div class="form-row">
      <input type="text" id="desc" placeholder="說明（如：午餐、薪水）" />
    </div>
    <div class="form-row">
      <input type="number" id="amount" placeholder="金額" min="0" style="flex:1" />
      <select id="category" style="flex:1">
        <option value="飲食">飲食</option>
        <option value="交通">交通</option>
        <option value="購物">購物</option>
        <option value="娛樂">娛樂</option>
        <option value="薪水">薪水</option>
        <option value="醫療">醫療</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="form-row">
      <input type="date" id="record-date" style="flex:1" />
    </div>
    <button class="add-btn" onclick="addRecord()">新增</button>
  </div>

  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <span class="month-nav-label" id="month-nav-label"></span>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>

  <div class="section-title">紀錄</div>
  <div id="records-list"><div class="empty">本期還沒有紀錄</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
  const catEmoji = { 飲食:'🍱', 交通:'🚌', 購物:'🛍', 娛樂:'🎮', 薪水:'💼', 醫療:'💊', 其他:'📌' };
  const catColors = { 飲食:'#378ADD', 交通:'#1D9E75', 購物:'#D85A30', 娛樂:'#7F77DD', 薪水:'#BA7517', 醫療:'#D4537E', 其他:'#888780' };
  const fallbackColors = ['#378ADD','#1D9E75','#D85A30','#7F77DD','#BA7517','#D4537E','#888780'];

  let currentType = 'income';
  let chartType = 'expense';
  let pieChart = null;
  let records = JSON.parse(localStorage.getItem('budget_records_v3') || '[]');

  const CYCLE_START = 5;

  // 設定日期欄位預設為今天
  const today = new Date();
  const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  document.getElementById('record-date').value = todayStr;

  function getCycleKey(dateStr) {
    // dateStr: 'YYYY-MM-DD'
    const [y, m, d] = dateStr.split('-').map(Number);
    if (d < CYCLE_START) {
      let pm = m - 1, py = y;
      if (pm < 1) { pm = 12; py--; }
      return py + '-' + String(pm).padStart(2, '0');
    }
    return y + '-' + String(m).padStart(2, '0');
  }

  function getCycleLabel(key) {
    const [y, m] = key.split('-').map(Number);
    let endY = y, endM = m + 1;
    if (endM > 12) { endM = 1; endY++; }
    return y + '/' + m + '/' + CYCLE_START + ' — ' + endY + '/' + endM + '/' + (CYCLE_START - 1);
  }

  function getCycleNavLabel(key) {
    const [y, m] = key.split('-').map(Number);
    return y + ' 年 ' + m + ' 月帳期';
  }

  let currentCycleKey = getCycleKey(todayStr);

  function changeMonth(delta) {
    let [y, m] = currentCycleKey.split('-').map(Number);
    m += delta;
    if (m > 12) { m = 1; y++; }
    if (m < 1) { m = 12; y--; }
    currentCycleKey = y + '-' + String(m).padStart(2, '0');
    render();
  }

  function setType(t) {
    currentType = t;
    document.getElementById('btn-income').className = 'type-btn' + (t === 'income' ? ' active-income' : '');
    document.getElementById('btn-expense').className = 'type-btn' + (t === 'expense' ? ' active-expense' : '');
  }

  function setChartType(t) {
    chartType = t;
    document.querySelectorAll('.chart-tab').forEach((btn, i) => {
      btn.className = 'chart-tab' + ((i === 0 && t === 'expense') || (i === 1 && t === 'income') ? ' active' : '');
    });
    renderChart(records.filter(r => r.cycleKey === currentCycleKey));
  }

  function addRecord() {
    const desc = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const category = document.getElementById('category').value;
    const dateVal = document.getElementById('record-date').value;
    if (!desc || isNaN(amount) || amount <= 0) { alert('請填寫說明和金額'); return; }
    if (!dateVal) { alert('請選擇日期'); return; }

    // 顯示用日期（本地格式）
    const [y, m, d] = dateVal.split('-').map(Number);
    const displayDate = y + '/' + m + '/' + d;

    records.push({
      id: Date.now(),
      type: currentType,
      desc,
      amount: Math.round(amount),
      category,
      date: displayDate,
      dateStr: dateVal,
      cycleKey: getCycleKey(dateVal)
    });

    // 按日期排序（新到舊）
    records.sort((a, b) => b.dateStr.localeCompare(a.dateStr));

    save();
    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    // 切換到該筆紀錄所在的帳期
    currentCycleKey = getCycleKey(dateVal);
    render();
  }

  function deleteRecord(id) {
    if (!confirm('確定刪除這筆紀錄？')) return;
    records = records.filter(r => r.id !== id);
    save();
    render();
  }

  function save() {
    localStorage.setItem('budget_records_v3', JSON.stringify(records));
  }

  function renderChart(filtered) {
    const area = document.getElementById('chart-area');
    const subset = filtered.filter(r => r.type === chartType);
    if (subset.length === 0) {
      if (pieChart) { pieChart.destroy(); pieChart = null; }
      area.innerHTML = '<div class="chart-empty">本期尚無' + (chartType === 'expense' ? '支出' : '收入') + '資料</div>';
      return;
    }
    const totals = {};
    subset.forEach(r => { totals[r.category] = (totals[r.category] || 0) + r.amount; });
    const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
    const total = sorted.reduce((s, [, v]) => s + v, 0);
    const labels = sorted.map(([k]) => k);
    const values = sorted.map(([, v]) => v);
    const colors = labels.map((l, i) => catColors[l] || fallbackColors[i % fallbackColors.length]);

    area.innerHTML = '<div class="chart-wrap"><canvas id="pie" width="140" height="140" style="flex-shrink:0"></canvas><div class="legend" id="legend"></div></div>';
    const ctx = document.getElementById('pie').getContext('2d');
    if (pieChart) pieChart.destroy();
    pieChart = new Chart(ctx, {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
      options: {
        cutout: '60%',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => ' NT$' + c.parsed.toLocaleString() + ' (' + Math.round(c.parsed / total * 100) + '%)' } }
        },
        animation: { duration: 400 }
      }
    });
    document.getElementById('legend').innerHTML = sorted.map(([cat, val], i) => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${colors[i]}"></div>
        <span class="legend-name">${catEmoji[cat] || ''} ${cat}</span>
        <span class="legend-pct">${Math.round(val / total * 100)}%</span>
      </div>
    `).join('');
  }

  function render() {
    document.getElementById('month-nav-label').textContent = getCycleNavLabel(currentCycleKey);
    document.getElementById('period-label').textContent = getCycleLabel(currentCycleKey);
    const filtered = records.filter(r => r.cycleKey === currentCycleKey);
    let income = 0, expense = 0;
    filtered.forEach(r => { if (r.type === 'income') income += r.amount; else expense += r.amount; });
    document.getElementById('balance').textContent = 'NT$' + (income - expense).toLocaleString();
    document.getElementById('total-income').textContent = 'NT$' + income.toLocaleString();
    document.getElementById('total-expense').textContent = 'NT$' + expense.toLocaleString();
    renderChart(filtered);
    const list = document.getElementById('records-list');
    if (filtered.length === 0) { list.innerHTML = '<div class="empty">本期還沒有紀錄</div>'; return; }
    list.innerHTML = filtered.map(r => `
      <div class="record">
        <div class="record-icon" style="background:${r.type==='income'?'#E1F5EE':'#FCEBEB'}">${catEmoji[r.category]||'📌'}</div>
        <div class="record-info">
          <div class="record-name">${r.desc}</div>
          <div class="record-meta">${r.category} · ${r.date}</div>
        </div>
        <span class="record-amount" style="color:${r.type==='income'?'#1D9E75':'#E24B4A'}">${r.type==='income'?'+':'-'}NT$${r.amount.toLocaleString()}</span>
        <button class="del-btn" onclick="deleteRecord(${r.id})">×</button>
      </div>
    `).join('');
  }

  render();
</script>
</body>
</html>
